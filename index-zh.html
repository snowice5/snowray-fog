<!DOCTYPE html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snowray Fog</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <section class="reset-panel" aria-labelledby="page-title">
        <div class="brand-mark">
          <img src="Snowray Insights logo.png" alt="Snowray Insights logo" />
        </div>

        <p class="eyebrow">Snowray Insights</p>
        <h1 id="page-title">Snowray Fog</h1>
        <p class="subtitle">給霧霧的工作日，一次溫柔重啟。</p>

        <div class="message-area" aria-live="polite">
          <p id="reset-message">
            先退一步。訊號常常會在安靜下來之後，自己浮現。
          </p>
        </div>

        <button id="reset-button" type="button">給我一個重啟</button>
        <a
          class="music-link"
          href="https://www.youtube.com/@SnowrayInsights"
          target="_blank"
          rel="noopener noreferrer"
        >
          到 YouTube 聽我製作的 rest 輕音樂
        </a>
      </section>
    </main>

    <script src="script-zh.js"></script>
  </body>
</html>
