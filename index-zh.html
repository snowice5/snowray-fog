<!DOCTYPE html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snowray Fog</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="fog-overlay" aria-hidden="true">
      <span class="fog fog-one"></span>
      <span class="fog fog-two"></span>
      <span class="fog fog-three"></span>
      <span class="soft-light"></span>
    </div>

    <main class="page">
      <section class="reset-panel" aria-labelledby="page-title">
        <div class="brand-mark">
          <img src="Snowray Insights logo.png" alt="Snowray Insights logo" />
        </div>

        <p class="eyebrow">Snowray Insights</p>
        <h1 id="page-title">Snowray Fog</h1>
        <p class="subtitle">給霧霧的工作日，一次溫柔重啟。</p>

        <div class="message-area" aria-live="polite">
          <p id="reset-message">
            先停一下。真正重要的事，可能正被雜訊蓋住。
          </p>
        </div>

        <button id="reset-button" type="button">給我一個重啟</button>

        <div class="sound-control">
          <audio id="ambient-audio" src="Snowlight Reverie.mp3" loop preload="metadata"></audio>
          <button id="sound-button" class="sound-button" type="button">
            播放 Snowlight
          </button>
        </div>

        <a
          class="music-link"
          href="https://www.youtube.com/@SnowrayInsights"
          target="_blank"
          rel="noopener noreferrer"
        >
          前往 YouTube 頻道，聽 Snowray vibe music
        </a>
      </section>
    </main>

    <script src="script-zh.js"></script>
  </body>
</html>
