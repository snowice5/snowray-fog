<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snowray Fog</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <section class="reset-panel" aria-labelledby="page-title">
        <div class="brand-mark">
          <img src="Snowray Insights logo.png" alt="Snowray Insights logo" />
        </div>

        <p class="eyebrow">Snowray Insights</p>
        <h1 id="page-title">Snowray Fog</h1>
        <p class="subtitle">A soft reset for your foggy workday.</p>

        <div class="message-area" aria-live="polite">
          <p id="reset-message">
            Step back. The signal often returns when the room gets quiet.
          </p>
        </div>

        <button id="reset-button" type="button">Give me a reset</button>
        <a
          class="music-link"
          href="https://www.youtube.com/@SnowrayInsights"
          target="_blank"
          rel="noopener noreferrer"
        >
          Rest with Snowray light music on YouTube
        </a>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
